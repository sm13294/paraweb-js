<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParaWeb Farm Browser Demo</title>
    <style>
      body {
        font-family: "Times New Roman", Times, serif;
        margin: 24px;
      }
      .row {
        margin-bottom: 12px;
      }
      input, button, select {
        font-family: inherit;
        font-size: 14px;
      }
      .output {
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 12px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>ParaWeb Browser Demos</h1>
    <div class="row">
      <a href="./index.html">Map</a> |
      <a href="./filter.html">Filter</a> |
      <a href="./reduce.html">Reduce</a> |
      <a href="./scan.html">Scan</a> |
      <a href="./accumulator.html">Accumulator</a> |
      <a href="./mapreduce.html">MapReduce</a> |
      <a href="./scatter.html">Scatter</a> |
      <a href="./stencil.html">Stencil</a> |
      <a href="./farm.html">Farm</a> |
      <a href="./pipeline.html">Pipeline</a> |
      <a href="./divideandconquer.html">Divide-and-Conquer</a> |
      <a href="./benchmarks.html">Benchmarks</a>
    </div>
    <h2>Farm (Browser Worker) Demo</h2>
    <div class="row">
      <label for="size">Input size</label>
      <input id="size" type="number" min="1" value="100000" />
      <label for="max">Max value</label>
      <input id="max" type="number" min="1" value="1000" />
    </div>
    <div class="row">
      <label for="fnSelect">Farm function</label>
      <select id="fnSelect">
        <option value="collatzTrig200" selected>Heavy: Collatz steps + 200-iteration trig refinement (paper)</option>
        <option value="double">Double</option>
        <option value="collatz">Collatz steps</option>
      </select>
    </div>
    <div class="row">
      <label for="variantSelect">Variant</label>
      <select id="variantSelect">
        <option value="mp" selected>MP (Worker Threads, postMessage)</option>
        <option value="shared">Shared (SharedArrayBuffer)</option>
        <option value="gpu">GPU (WebGPU compute shader)</option>
      </select>
      <label for="threads">Threads</label>
      <input id="threads" type="number" min="1" value="4" />
      <button id="run">Run</button>
    </div>
    <div class="row">
      <strong>Output</strong>
      <div id="output" class="output"></div>
    </div>
    <script src="./gpu-bundle.js"></script>
    <script type="module">
      import { FarmBrowser } from "./farmBrowser.js";
      import { FarmSharedBrowser } from "./farmSharedBrowser.js";

      const farmMP = new FarmBrowser();
      const farmShared = new FarmSharedBrowser();
      const variantSelectEl = document.getElementById("variantSelect");

      // GPU Farm: per-task op as a built-in name (paper) or WGSL.
      // farm_collatz_trig_200 mirrors the paper Farm benchmark exactly.
      const gpuFarmMap = {
        collatzTrig200: "farm_collatz_trig_200",
        double: { wgsl: "x * 2.0" },
        collatz: "collatz_steps",
      };
      const sizeEl = document.getElementById("size");
      const maxEl = document.getElementById("max");
      const fnSelectEl = document.getElementById("fnSelect");
      const threadsEl = document.getElementById("threads");
      const outputEl = document.getElementById("output");
      const runBtn = document.getElementById("run");

      runBtn.addEventListener("click", async () => {
        outputEl.textContent = "Running...";
        const size = Math.max(1, Number(sizeEl.value) || 1);
        const maxVal = Math.max(1, Number(maxEl.value) || 1000);
        const input = Array.from({ length: size }, () =>
          Math.floor(Math.random() * maxVal) + 1
        );

        const fnMap = {
          // Paper Farm workload (Section 5.2): Collatz step-count followed
          // by a 200-iteration trigonometric refinement. Collatz drives
          // mild per-task cost variance, the refinement raises absolute
          // per-task cost so worker coordination amortizes.
          collatzTrig200: (n) => {
            let steps = 0;
            let num = n;
            while (num !== 1) {
              if (num % 2 === 0) {
                num = num / 2;
              } else {
                num = 3 * num + 1;
              }
              steps++;
              if (steps > 10000) break;
            }
            let v = steps;
            for (let k = 0; k < 200; k++) {
              v = Math.sin(v) + Math.cos(v * 0.5) + Math.sqrt(Math.abs(v) + 1);
              v = v * v + 1;
            }
            return v;
          },
          double: (x) => x * 2,
          collatz: (n) => {
            let steps = 0;
            let num = n;
            while (num !== 1) {
              if (num % 2 === 0) {
                num = num / 2;
              } else {
                num = 3 * num + 1;
              }
              steps++;
              if (steps > 10000) break;
            }
            return steps;
          },
        };
        const fnKey = fnSelectEl.value;
        const fn = fnMap[fnKey];
        const threads = Number(threadsEl.value) || undefined;
        const variant = variantSelectEl.value;

        const start = performance.now();
        try {
          let result;
          if (variant === "gpu") {
            if (!window.PW_GPU || !(await window.PW_GPU.isGPUAvailable())) {
              throw new Error("WebGPU is not available in this browser/context.");
            }
            const op = gpuFarmMap[fnKey];
            if (!op) {
              throw new Error(`GPU variant does not support the "${fnKey}" scenario in this demo.`);
            }
            result = await new window.PW_GPU.Farm().farm(op, input);
          } else if (variant === "shared") {
            result = await farmShared.farm(fn, input, threads);
          } else {
            result = await farmMP.farm(fn, input, threads);
          }
          const elapsed = performance.now() - start;
          const sample = Array.from(result.slice(0, 20)).map((v) => Number(v).toFixed(3)).join(", ");
          outputEl.textContent =
            `Output length: ${result.length}\n` +
            `Sample: ${sample}\n` +
            `Time: ${elapsed.toFixed(2)}ms`;
        } catch (error) {
          outputEl.textContent = "Error: " + error.message;
        }
      });
    </script>
  </body>
</html>
