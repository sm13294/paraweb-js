<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParaWeb MapReduce Browser Demo</title>
    <style>
      body {
        font-family: "Times New Roman", Times, serif;
        margin: 24px;
      }
      .row {
        margin-bottom: 12px;
      }
      input,
      button,
      select {
        font-family: inherit;
        font-size: 14px;
      }
      .output {
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 12px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>ParaWeb Benchmark Dashboard</h1>
    <div id="nav" class="row"></div>
    <h2>MapReduce (Browser Worker) Demo</h2>
    <div class="row">
      <label for="size">Input size</label>
      <input id="size" type="number" min="1" value="100000" />
      <label for="max">Max value</label>
      <input id="max" type="number" min="1" value="1000" />
    </div>
    <div class="row">
      <label for="fnSelect">MapReduce scenario</label>
      <select id="fnSelect">
        <option value="trig50Sum" selected>
          Heavy: 50-iteration trig+poly map then sum (paper benchmark)
        </option>
        <option value="doubleSum">Double then sum</option>
        <option value="squareSum">Square then sum</option>
        <option value="collatzSum">Collatz steps then sum</option>
      </select>
    </div>
    <div class="row">
      <label for="variantSelect">Variant</label>
      <select id="variantSelect">
        <option value="mp" selected>MP (Worker Threads, postMessage)</option>
        <option value="shared">Shared (SharedArrayBuffer)</option>
        <option value="gpu">GPU (WebGPU compute shader)</option>
      </select>
      <label for="threads">Threads</label>
      <input id="threads" type="number" min="1" value="4" />
      <button id="run">Run</button>
    </div>
    <div class="row">
      <strong>Output</strong>
      <div id="output" class="output"></div>
    </div>
    <script src="./gpu-bundle.js"></script>
    <script type="module">
      import { MapReduceBrowser } from "./mapReduceBrowser.js";
      import { MapReduceSharedBrowser } from "./mapReduceSharedBrowser.js";

      const mapReduceMP = new MapReduceBrowser();
      const mapReduceShared = new MapReduceSharedBrowser();
      const variantSelectEl = document.getElementById("variantSelect");

      // GPU MapReduce: per-element map op (built-in name or WGSL) + binary reduce op.
      // trig50Sum matches the paper's MapReduce workload.
      const gpuMapReduceMap = {
        trig50Sum: { mapOp: "trig_50", reduceOp: "add" },
        doubleSum: { mapOp: { wgsl: "x * 2.0" }, reduceOp: "add" },
        squareSum: { mapOp: { wgsl: "x * x" }, reduceOp: "add" },
        collatzSum: null,
      };
      const sizeEl = document.getElementById("size");
      const maxEl = document.getElementById("max");
      const fnSelectEl = document.getElementById("fnSelect");
      const threadsEl = document.getElementById("threads");
      const outputEl = document.getElementById("output");
      const runBtn = document.getElementById("run");

      runBtn.addEventListener("click", async () => {
        outputEl.textContent = "Running...";
        const size = Math.max(1, Number(sizeEl.value) || 1);
        const maxVal = Math.max(1, Number(maxEl.value) || 1000);
        const input = Array.from(
          { length: size },
          () => Math.floor(Math.random() * maxVal) + 1,
        );

        const scenarios = {
          // 50-iteration trig+poly map followed by associative sum.
          // Matches the MapReduce workload reported in the paper (Section 5.2).
          trig50Sum: {
            mapFn: (x) => {
              let v = x;
              for (let k = 0; k < 50; k++) {
                v =
                  Math.sin(v) + Math.cos(v * 0.5) + Math.sqrt(Math.abs(v) + 1);
                v = v * v + 1;
              }
              return v;
            },
            reduceFn: (acc, x) => acc + x,
          },
          doubleSum: {
            mapFn: (x) => x * 2,
            reduceFn: (acc, x) => acc + x,
          },
          squareSum: {
            mapFn: (x) => x * x,
            reduceFn: (acc, x) => acc + x,
          },
          collatzSum: {
            mapFn: (n) => {
              let steps = 0;
              let num = n;
              while (num !== 1) {
                if (num % 2 === 0) {
                  num = num / 2;
                } else {
                  num = 3 * num + 1;
                }
                steps++;
                if (steps > 10000) break;
              }
              return steps;
            },
            reduceFn: (acc, x) => acc + x,
          },
        };
        const fnKey = fnSelectEl.value;
        const { mapFn, reduceFn } = scenarios[fnKey];
        const threads = Number(threadsEl.value) || undefined;
        const variant = variantSelectEl.value;

        const start = performance.now();
        try {
          let result;
          if (variant === "gpu") {
            if (!window.PW_GPU || !(await window.PW_GPU.isGPUAvailable())) {
              throw new Error(
                "WebGPU is not available in this browser/context.",
              );
            }
            const cfg = gpuMapReduceMap[fnKey];
            if (!cfg) {
              throw new Error(
                `GPU variant does not support the "${fnKey}" scenario in this demo.`,
              );
            }
            result = await new window.PW_GPU.MapReduce().mapReduce(
              cfg.mapOp,
              cfg.reduceOp,
              input,
            );
          } else if (variant === "shared") {
            result = await mapReduceShared.mapReduce(
              mapFn,
              reduceFn,
              input,
              threads,
            );
          } else {
            result = await mapReduceMP.mapReduce(
              mapFn,
              reduceFn,
              input,
              threads,
            );
          }
          const elapsed = performance.now() - start;
          outputEl.textContent = `Result: ${result}\nTime: ${elapsed.toFixed(2)}ms`;
        } catch (error) {
          outputEl.textContent = "Error: " + error.message;
        }
      });
    </script>
    <script src="./nav.js"></script>
  </body>
</html>
