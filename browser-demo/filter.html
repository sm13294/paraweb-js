<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParaWeb Filter Browser Demo</title>
    <style>
      body {
        font-family: "Times New Roman", Times, serif;
        margin: 24px;
      }
      .row {
        margin-bottom: 12px;
      }
      input, button, select {
        font-family: inherit;
        font-size: 14px;
      }
      .output {
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 12px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>ParaWeb Browser Demos</h1>
    <div class="row">
      <a href="./index.html">Map</a> |
      <a href="./filter.html">Filter</a> |
      <a href="./reduce.html">Reduce</a> |
      <a href="./scan.html">Scan</a> |
      <a href="./accumulator.html">Accumulator</a> |
      <a href="./mapreduce.html">MapReduce</a> |
      <a href="./scatter.html">Scatter</a> |
      <a href="./stencil.html">Stencil</a> |
      <a href="./farm.html">Farm</a> |
      <a href="./pipeline.html">Pipeline</a> |
      <a href="./divideandconquer.html">Divide-and-Conquer</a> |
      <a href="./benchmarks.html">Benchmarks</a>
    </div>
    <h2>Filter (Browser Worker) Demo</h2>
    <div class="row">
      <label for="size">Input size</label>
      <input id="size" type="number" min="1" value="100000" />
      <label for="max">Max value</label>
      <input id="max" type="number" min="1" value="1000" />
    </div>
    <div class="row">
      <label for="fnSelect">Filter function</label>
      <select id="fnSelect">
        <option value="trig30gt2" selected>Heavy: 30-iteration trig predicate &gt; 2 (paper benchmark)</option>
        <option value="even">Even numbers</option>
        <option value="gt500">Greater than 500</option>
        <option value="prime">Prime check</option>
      </select>
    </div>
    <div class="row">
      <label for="variantSelect">Variant</label>
      <select id="variantSelect">
        <option value="mp" selected>MP (Worker Threads, postMessage)</option>
        <option value="shared">Shared (SharedArrayBuffer)</option>
        <option value="gpu">GPU (WebGPU compute shader)</option>
      </select>
      <label for="threads">Threads</label>
      <input id="threads" type="number" min="1" value="4" />
      <button id="run">Run</button>
    </div>
    <div class="row">
      <strong>Output</strong>
      <div id="output" class="output"></div>
    </div>
    <script src="../browser-bench/gpu-bundle.js"></script>
    <script type="module">
      import { FilterBrowser } from "./filterBrowser.js";
      import { FilterSharedBrowser } from "./filterSharedBrowser.js";

      const filterMP = new FilterBrowser();
      const filterShared = new FilterSharedBrowser();
      const variantSelectEl = document.getElementById("variantSelect");

      // Map predicate keys to a built-in WGSL operation name (matches the
      // paper benchmark) or a custom WGSL expression returning bool. Scenarios
      // that cannot be expressed compactly resolve to null.
      const gpuPredMap = {
        trig30gt2: "trig_gt2",
        even: null,
        gt500: { wgsl: "x > 500.0" },
        prime: null,
      };
      const sizeEl = document.getElementById("size");
      const maxEl = document.getElementById("max");
      const fnSelectEl = document.getElementById("fnSelect");
      const threadsEl = document.getElementById("threads");
      const outputEl = document.getElementById("output");
      const runBtn = document.getElementById("run");

      runBtn.addEventListener("click", async () => {
        outputEl.textContent = "Running...";
        const size = Math.max(1, Number(sizeEl.value) || 1);
        const maxVal = Math.max(1, Number(maxEl.value) || 100);
        const input = Array.from({ length: size }, () =>
          Math.floor(Math.random() * maxVal)
        );

        const fnMap = {
          // 30-iteration trig predicate followed by a threshold; matches the
          // Filter workload reported in the paper (Section 5.2).
          trig30gt2: (x) => {
            let v = x;
            for (let k = 0; k < 30; k++) {
              v = Math.sin(v) + Math.cos(v * 0.5) + Math.sqrt(Math.abs(v) + 1);
            }
            return v > 2;
          },
          even: (x) => x % 2 === 0,
          gt500: (x) => x > 500,
          prime: (n) => {
            if (n < 2) return false;
            if (n === 2) return true;
            if (n % 2 === 0) return false;
            const sqrt = Math.sqrt(n);
            for (let i = 3; i <= sqrt; i += 2) {
              if (n % i === 0) return false;
            }
            return true;
          },
        };
        const fnKey = fnSelectEl.value;
        const fn = fnMap[fnKey];
        const threads = Number(threadsEl.value) || undefined;
        const variant = variantSelectEl.value;

        const start = performance.now();
        try {
          let result;
          if (variant === "gpu") {
            if (!window.PW_GPU || !(await window.PW_GPU.isGPUAvailable())) {
              throw new Error("WebGPU is not available in this browser/context.");
            }
            const pred = gpuPredMap[fnKey];
            if (pred == null) {
              throw new Error(`GPU variant does not support the "${fnKey}" predicate in this demo. Pick the heavy paper workload or "Greater than 500".`);
            }
            result = await new window.PW_GPU.Filter().filter(pred, input);
          } else if (variant === "shared") {
            result = await filterShared.filter(fn, input, threads);
          } else {
            result = await filterMP.filter(fn, input, threads);
          }
          const elapsed = performance.now() - start;
          const sample = Array.from(result.slice(0, 20)).map((v) => Number(v).toFixed(3)).join(", ");
          outputEl.textContent =
            `Output length: ${result.length}\n` +
            `Sample: ${sample}\n` +
            `Time: ${elapsed.toFixed(2)}ms`;
        } catch (error) {
          outputEl.textContent = "Error: " + error.message;
        }
      });
    </script>
  </body>
</html>
