<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParaWeb Divide-and-Conquer Browser Demo</title>
    <style>
      body {
        font-family: "Times New Roman", Times, serif;
        margin: 24px;
      }
      .row {
        margin-bottom: 12px;
      }
      input, button, select {
        font-family: inherit;
        font-size: 14px;
      }
      .output {
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 12px;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>ParaWeb Browser Demos</h1>
    <div class="row">
      <a href="./index.html">Map</a> |
      <a href="./filter.html">Filter</a> |
      <a href="./reduce.html">Reduce</a> |
      <a href="./scan.html">Scan</a> |
      <a href="./accumulator.html">Accumulator</a> |
      <a href="./mapreduce.html">MapReduce</a> |
      <a href="./scatter.html">Scatter</a> |
      <a href="./stencil.html">Stencil</a> |
      <a href="./farm.html">Farm</a> |
      <a href="./pipeline.html">Pipeline</a> |
      <a href="./divideandconquer.html">Divide-and-Conquer</a> |
      <a href="./benchmarks.html">Benchmarks</a>
    </div>
    <h2>Divide-and-Conquer (Browser Worker) Demo</h2>
    <div class="row">
      <label for="size">Input size (FFT requires a power of two)</label>
      <input id="size" type="number" min="1" value="65536" />
      <label for="max">Max value</label>
      <input id="max" type="number" min="1" value="1000" />
    </div>
    <div class="row">
      <label for="fnSelect">Scenario</label>
      <select id="fnSelect">
        <option value="fft" selected>FFT (paper benchmark, parallel Cooley-Tukey radix-2)</option>
        <option value="sum">Sum</option>
        <option value="max">Max</option>
        <option value="sort">Merge sort</option>
      </select>
    </div>
    <div class="row">
      <label for="variantSelect">Variant</label>
      <select id="variantSelect">
        <option value="mp" selected>MP (Worker Threads, postMessage)</option>
        <option value="shared">Shared (SharedArrayBuffer)</option>
        <option value="gpu">GPU (WebGPU compute shader)</option>
      </select>
      <label for="threads">Threads</label>
      <input id="threads" type="number" min="1" value="4" />
      <button id="run">Run</button>
    </div>
    <div class="row">
      <strong>Output</strong>
      <div id="output" class="output"></div>
    </div>
    <script src="../browser-bench/gpu-bundle.js"></script>
    <script type="module">
      import { DivideAndConquerBrowser } from "./divideAndConquerBrowser.js";
      import { DivideAndConquerSharedBrowser } from "./divideAndConquerSharedBrowser.js";

      const dacMP = new DivideAndConquerBrowser();
      const dacShared = new DivideAndConquerSharedBrowser();
      const variantSelectEl = document.getElementById("variantSelect");
      const sizeEl = document.getElementById("size");
      const maxEl = document.getElementById("max");
      const fnSelectEl = document.getElementById("fnSelect");
      const threadsEl = document.getElementById("threads");
      const outputEl = document.getElementById("output");
      const runBtn = document.getElementById("run");

      const divideFn = (arr) => {
        if (arr.length <= 1) return [];
        const mid = Math.floor(arr.length / 2);
        return [arr.slice(0, mid), arr.slice(mid)];
      };
      const baseCaseFn = (arr) => arr.length <= 1;

      const conquerMap = {
        sum: (results) => {
          const flattened = results.map((r) => (Array.isArray(r) ? r[0] : r));
          return flattened.reduce((a, b) => a + b, 0);
        },
        max: (results) => {
          const flattened = results.map((r) => (Array.isArray(r) ? r[0] : r));
          return Math.max(...flattened);
        },
        sort: (results) => {
          const left = Array.isArray(results[0]) ? results[0] : [results[0]];
          const right = Array.isArray(results[1]) ? results[1] : [results[1]];
          const merged = [];
          let i = 0;
          let j = 0;
          while (i < left.length && j < right.length) {
            if (left[i] <= right[j]) {
              merged.push(left[i++]);
            } else {
              merged.push(right[j++]);
            }
          }
          return merged.concat(left.slice(i)).concat(right.slice(j));
        },
      };

      runBtn.addEventListener("click", async () => {
        outputEl.textContent = "Running...";
        const size = Math.max(1, Number(sizeEl.value) || 1);
        const maxVal = Math.max(1, Number(maxEl.value) || 1000);
        const scenario = fnSelectEl.value;
        const threads = Number(threadsEl.value) || undefined;

        const variant = variantSelectEl.value;

        if (scenario === "fft") {
          // Paper D&C workload (Section 5.2): parallel Cooley-Tukey radix-2 FFT
          // on a complex array of N points (interleaved real/imaginary in a
          // Float64Array). N must be a power of two.
          if ((size & (size - 1)) !== 0) {
            outputEl.textContent = "FFT requires N to be a power of two; got " + size;
            return;
          }
          const buf = new Float64Array(2 * size);
          for (let i = 0; i < size; i++) {
            buf[2 * i] = Math.sin(i * 0.001) + Math.cos(i * 0.0005);
          }
          const start = performance.now();
          try {
            let result;
            if (variant === "gpu") {
              if (!window.PW_GPU || !(await window.PW_GPU.isGPUAvailable())) {
                throw new Error("WebGPU is not available in this browser/context.");
              }
              result = await new window.PW_GPU.DivideAndConquer().fft(buf);
            } else if (variant === "shared") {
              result = await dacShared.fft(buf, threads);
            } else {
              result = await dacMP.fft(buf, threads);
            }
            const elapsed = performance.now() - start;
            outputEl.textContent =
              `FFT length: ${result.length / 2} complex points\n` +
              `First 5 (real, imag): ${Array.from(result.slice(0, 10)).map((v) => Number(v).toFixed(3)).join(", ")}\n` +
              `Time: ${elapsed.toFixed(2)}ms`;
          } catch (error) {
            outputEl.textContent = "Error: " + error.message;
          }
          return;
        }

        if (variant === "gpu") {
          outputEl.textContent = "GPU variant supports only the FFT scenario in this demo.";
          return;
        }

        const input = Array.from({ length: size }, () =>
          Math.floor(Math.random() * maxVal)
        );

        const conquerFn = conquerMap[scenario];
        const start = performance.now();
        try {
          const dac = variant === "shared" ? dacShared : dacMP;
          const result = await dac.divideAndConquer(
            divideFn,
            conquerFn,
            baseCaseFn,
            input,
            threads
          );
          const elapsed = performance.now() - start;
          const preview = Array.isArray(result)
            ? JSON.stringify(result.slice(0, 20))
            : String(result);
          outputEl.textContent =
            `Result preview: ${preview}\nTime: ${elapsed.toFixed(2)}ms`;
        } catch (error) {
          outputEl.textContent = "Error: " + error.message;
        }
      });
    </script>
  </body>
</html>
